<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inbox Sweeper</title>
  <link rel="stylesheet" href="sidePanel.css" />
</head>
<body>
  <div id="app">

    <header id="topbar">
      <h1 id="app-title">📬 Inbox</h1>
      <button id="refresh-btn" title="Rescan inbox">⟳</button>
    </header>

    <section id="list-view">
      <div id="status-bar"></div>
      <div id="category-filters"></div>
      <ul id="newsletter-list"></ul>
      <div id="empty-state" class="hidden">
        <p>No clutter found yet.</p>
        <button id="scan-btn">Scan my inbox</button>
      </div>
    </section>

    <section id="detail-view" class="hidden">
      <div id="detail-header">
        <button id="back-btn">← Back</button>
        <div id="detail-actions">
         <button id="unsubscribe-btn">Unsubscribe</button>
         <button id="delete-all-btn">🗑 Delete All</button>
        </div>
      </div>
      <h2 id="detail-sender-name"></h2>
      <p id="detail-sender-meta"></p>
      <ul id="detail-message-list"></ul>
    </section>
    <!-- MAIL READER MODAL -->
    <div id="mail-modal" class="hidden">
    <div id="mail-modal-inner">
    <div id="mail-modal-header">
      <button id="mail-modal-close">← Back</button>
        </div>
        <h2 id="mail-modal-subject"></h2>
        <p id="mail-modal-meta"></p>
        <div id="mail-modal-body"></div>
     </div>
    </div>
  </div>

  <script src="sidePanel.js"></script>
</body>
</html>
